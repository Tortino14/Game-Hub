<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a1a;
  color: white;
  text-align: center;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: #111;
}

/* BUTTONS */
button {
  padding: 8px 12px;
  margin-left: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #00fff0;
  color: black;
  font-weight: bold;
}

button:hover {
  background: #00c9c0;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.game {
  background: #1a1a2e;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #333;
}

/* LINK */
a {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: cyan;
  color: black;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div id="title">Game Hub</div>

  <div>
    <!-- LANGUAGE BUTTON -->
    <button onclick="switchLang()">🌐 Language</button>
    <button onclick="shareSite()">Share</button>
  </div>

</div>

<h2 id="subtitle">Choose a game</h2>

<div class="container">

  <div class="game">
    <h3>Astro Cow Human Catcher</h3>
    <a href="https://tortino14.github.io/Astro---Cow-Human-Catcher/" target="_blank">Play</a>
  </div>

  <div class="game">
    <h3>Astro Game</h3>
    <a href="https://tortino14.github.io/astro-game/" target="_blank">Play</a>
  </div>

  <div class="game">
    <h3>Astro Gravity</h3>
    <a href="https://tortino14.github.io/astro-gravity-/" target="_blank">Play</a>
  </div>

</div>

<script>

/* 🌐 LANGUAGES */
const langs = ["en","it","fr","es","ms","zh"];
let current = localStorage.getItem("lang") || "en";

/* TEXTS */
const data = {
  en: {title:"Game Hub", subtitle:"Choose a game"},
  it: {title:"Hub Giochi", subtitle:"Scegli un gioco"},
  fr: {title:"Hub de Jeux", subtitle:"Choisis un jeu"},
  es: {title:"Centro de Juegos", subtitle:"Elige un juego"},
  ms: {title:"Hab Permainan", subtitle:"Pilih permainan"},
  zh: {title:"游戏中心", subtitle:"选择一个游戏"}
};

/* APPLY LANGUAGE */
function applyLang(lang){
  document.getElementById("title").innerText = data[lang].title;
  document.getElementById("subtitle").innerText = data[lang].subtitle;
  localStorage.setItem("lang", lang);
}

/* SWITCH BUTTON */
function switchLang(){
  let index = langs.indexOf(current);
  index = (index + 1) % langs.length;
  current = langs[index];
  applyLang(current);
}

/* SHARE */
function shareSite(){
  navigator.share?.({
    title: "Game Hub",
    url: window.location.href
  }) || alert("Copy link: " + window.location.href);
}

/* LOAD SAVED LANGUAGE */
applyLang(current);

</script>

</body>
</html>
