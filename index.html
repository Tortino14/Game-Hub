<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tortino Games Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #000);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
      color: #00fff0;
      text-shadow: 0 0 10px #00fff0;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 40px;
    }

    .game {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,240,0.3);
      border-radius: 15px;
      width: 250px;
      margin: 15px;
      padding: 20px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,255,240,0.1);
    }

    .game:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,255,240,0.5);
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #00fff0;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a:hover {
      background: #00c9c0;
    }
  </style>
</head>

<body>

  <h1>🚀 Tortino Games Hub</h1>

  <div class="container">

    <div class="game">
      <h3>Astro Cow Human Catcher</h3>
      <a href="https://tortino14.github.io/Astro---Cow-Human-Catcher/" target="_blank">Play</a>
    </div>

    <div class="game">
      <h3>Astro Gravity</h3>
      <a href="https://tortino14.github.io/astro-gravity-/" target="_blank">Play</a>
    </div>

    <div class="game">
      <h3>Astro Gravity (Alt)</h3>
      <a href="https://tortino14.github.io/astro-gravity-/" target="_blank">Play</a>
    </div>

  </div>

</body>
</html>
