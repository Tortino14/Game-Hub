<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a1a;
  color: white;
  text-align: center;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: #111;
}

button, select {
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.game {
  background: #1a1a2e;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #333;
  position: relative;
}

/* BADGE */
.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: gold;
  color: black;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
}

/* BUTTON */
a {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: cyan;
  color: black;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div id="title">Game Hub</div>

  <div>
    <!-- LANGUAGE -->
    <select onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="it">IT</option>
      <option value="fr">FR</option>
      <option value="es">ES</option>
      <option value="ms">MY</option>
      <option value="zh">中文</option>
    </select>

    <!-- THEME -->
    <button onclick="toggleTheme()">Theme</button>

    <!-- SHARE -->
    <button onclick="shareSite()">Share</button>
  </div>
</div>

<h2 id="subtitle">Choose a game</h2>

<button onclick="suggestGame()">🎯 Suggest me a game</button>

<div id="suggest"></div>

<div class="container">

  <div class="game">
    <div class="badge">HOT</div>
    <h3>Astro Cow Human Catcher</h3>
    <a href="https://tortino14.github.io/Astro---Cow-Human-Catcher/" target="_blank">Play</a>
  </div>

  <div class="game">
    <h3>Astro Game</h3>
    <a href="https://tortino14.github.io/astro-game/" target="_blank">Play</a>
  </div>

  <div class="game">
    <h3>Astro Gravity</h3>
    <a href="https://tortino14.github.io/astro-gravity-/" target="_blank">Play</a>
  </div>

</div>

<script>
/* 🌐 TRANSLATIONS */
const langData = {
  en: {title:"Game Hub", subtitle:"Choose a game"},
  it: {title:"Hub Giochi", subtitle:"Scegli un gioco"},
  fr: {title:"Hub de Jeux", subtitle:"Choisis un jeu"},
  es: {title:"Centro de Juegos", subtitle:"Elige un juego"},
  ms: {title:"Hab Permainan", subtitle:"Pilih permainan"},
  zh: {title:"游戏中心", subtitle:"选择一个游戏"}
};

function setLang(lang){
  document.getElementById("title").innerText = langData[lang].title;
  document.getElementById("subtitle").innerText = langData[lang].subtitle;
}

/* 🎯 SUGGEST GAME */
function suggestGame(){
  const games = ["Astro Cow Human Catcher","Astro Game","Astro Gravity"];
  const pick = games[Math.floor(Math.random()*games.length)];
  document.getElementById("suggest").innerText = "👉 Try: " + pick;
}

/* 🎨 THEME */
let dark = true;
function toggleTheme(){
  if(dark){
    document.body.style.background = "#f2f2f2";
    document.body.style.color = "black";
  } else {
    document.body.style.background = "#0a0a1a";
    document.body.style.color = "white";
  }
  dark = !dark;
}

/* 📤 SHARE */
function shareSite(){
  navigator.share?.({
    title: "Game Hub",
    url: window.location.href
  }) || alert("Copy link: " + window.location.href);
}
</script>

</body>
</html>
